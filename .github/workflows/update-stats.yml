name: Update Stats

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch commit counts
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          PRIVATE_REPO: ljcairns/openclaw-config
          PUBLIC_REPO: ljcairns/briu-website
        run: |
          # Public repo - no auth needed
          WEBSITE_COMMITS=$(curl -sI "https://api.github.com/repos/${PUBLIC_REPO}/commits?per_page=1" \
            | grep -i '^link:' \
            | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p')
          WEBSITE_COMMITS=${WEBSITE_COMMITS:-1}

          # Private repo - uses fine-grained PAT
          AGENT_COMMITS=0
          if [ -n "$PRIVATE_REPO_TOKEN" ]; then
            AGENT_COMMITS=$(curl -sI \
              -H "Authorization: Bearer ${PRIVATE_REPO_TOKEN}" \
              "https://api.github.com/repos/${PRIVATE_REPO}/commits?per_page=1" \
              | grep -i '^link:' \
              | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p')
            AGENT_COMMITS=${AGENT_COMMITS:-0}
          fi

          TOTAL=$((WEBSITE_COMMITS + AGENT_COMMITS))
          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > stats.json << EOJSON
          {
            "websiteCommits": ${WEBSITE_COMMITS},
            "privateAgentCommits": ${AGENT_COMMITS},
            "totalCommits": ${TOTAL},
            "lastUpdated": "${UPDATED}"
          }
          EOJSON

          echo "Website: ${WEBSITE_COMMITS}, Agent: ${AGENT_COMMITS}, Total: ${TOTAL}"

      - name: Commit stats.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update stats.json [automated]"
          git push
