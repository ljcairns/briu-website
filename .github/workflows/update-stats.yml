name: Update Stats

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch commit counts
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ANTHROPIC_ADMIN_KEY: ${{ secrets.ANTHROPIC_ADMIN_KEY }}
          PRIVATE_REPO: ljcairns/openclaw-config
          PUBLIC_REPO: ljcairns/briu-website
        run: |
          set -e

          # Count commits by paginating (reliable for any repo size)
          count_commits() {
            local url="$1"
            local auth_header="$2"
            local total=0
            local page=1

            while true; do
              if [ -n "$auth_header" ]; then
                RESPONSE=$(curl -s -H "Authorization: Bearer ${auth_header}" \
                  "${url}?per_page=100&page=${page}")
              else
                RESPONSE=$(curl -s "${url}?per_page=100&page=${page}")
              fi

              COUNT=$(echo "$RESPONSE" | jq '. | length' 2>/dev/null || echo "0")

              if [ "$COUNT" = "0" ] || [ "$COUNT" = "null" ]; then
                break
              fi

              total=$((total + COUNT))

              if [ "$COUNT" -lt 100 ]; then
                break
              fi

              page=$((page + 1))
            done

            echo "$total"
          }

          # Public repo
          WEBSITE_COMMITS=$(count_commits "https://api.github.com/repos/${PUBLIC_REPO}/commits" "")
          echo "Website commits: ${WEBSITE_COMMITS}"

          # Private repo
          AGENT_COMMITS=0
          if [ -n "$PRIVATE_REPO_TOKEN" ]; then
            AGENT_COMMITS=$(count_commits "https://api.github.com/repos/${PRIVATE_REPO}/commits" "$PRIVATE_REPO_TOKEN")
            echo "Agent commits: ${AGENT_COMMITS}"
          else
            echo "No PRIVATE_REPO_TOKEN set, skipping private repo"
          fi

          TOTAL=$((WEBSITE_COMMITS + AGENT_COMMITS))
          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Lines of code — public repo (local checkout)
          WEBSITE_LOC=$(find . \( -name '*.html' -o -name '*.js' -o -name '*.css' -o -name '*.json' \) \
            -not -path '*/node_modules/*' -not -path '*/.wrangler/*' -not -path '*/.github/*' \
            -not -name 'package-lock.json' -not -name 'stats.json' \
            -exec cat {} + | wc -l | tr -d ' ')
          echo "Website lines of code: ${WEBSITE_LOC}"

          # Lines of code — private repo (shallow clone)
          AGENT_LOC=0
          if [ -n "$PRIVATE_REPO_TOKEN" ]; then
            TMPDIR=$(mktemp -d)
            git clone --depth 1 "https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/${PRIVATE_REPO}.git" "$TMPDIR" 2>/dev/null || true
            if [ -d "$TMPDIR" ]; then
              AGENT_LOC=$(find "$TMPDIR" \( -name '*.js' -o -name '*.ts' -o -name '*.json' -o -name '*.yml' -o -name '*.yaml' -o -name '*.toml' -o -name '*.md' \) \
                -not -path '*/node_modules/*' -not -path '*/.git/*' -not -name 'package-lock.json' \
                -exec cat {} + 2>/dev/null | wc -l | tr -d ' ')
              rm -rf "$TMPDIR"
            fi
            echo "Agent lines of code: ${AGENT_LOC}"
          fi

          LINES_OF_CODE=$((WEBSITE_LOC + AGENT_LOC))
          echo "Total lines of code: ${LINES_OF_CODE}"

          # Chart count (Briu.charts. assignments in charts.js)
          CHART_COUNT=0
          if [ -f charts.js ]; then
            CHART_COUNT=$(grep -c 'Briu\.charts\.' charts.js || true)
          fi
          echo "Chart count: ${CHART_COUNT}"

          # Article count (directories under /build/ with index.html)
          ARTICLE_COUNT=0
          if [ -d build ]; then
            ARTICLE_COUNT=$(find build -mindepth 1 -name 'index.html' | wc -l | tr -d ' ')
          fi
          echo "Article count: ${ARTICLE_COUNT}"

          # Words of content across all build article HTML files
          WORDS_OF_CONTENT=0
          if [ -d build ]; then
            WORDS_OF_CONTENT=$(find build -name 'index.html' -exec cat {} + | sed 's/<[^>]*>//g' | wc -w | tr -d ' ')
          fi
          echo "Words of content: ${WORDS_OF_CONTENT}"

          # Total HTML pages on the site
          PAGE_COUNT=$(find . -name 'index.html' \
            -not -path '*/node_modules/*' -not -path '*/.wrangler/*' | wc -l | tr -d ' ')
          echo "Page count: ${PAGE_COUNT}"

          # Anthropic API costs (last 30 days)
          AVG_DAILY_COST="3.20"
          PEAK_DAILY_COST="8.40"
          TOTAL_API_SPEND="0"
          if [ -n "$ANTHROPIC_ADMIN_KEY" ]; then
            # Fetch last 30 days of cost data (paginated)
            START_DATE=$(date -u -d '30 days ago' +"%Y-%m-%dT00:00:00Z" 2>/dev/null || date -u -v-30d +"%Y-%m-%dT00:00:00Z" 2>/dev/null || echo "")
            END_DATE=$(date -u +"%Y-%m-%dT23:59:59Z")
            echo "Cost API: start=$START_DATE end=$END_DATE"
            if [ -n "$START_DATE" ]; then
              # Paginate through all results
              ALL_DATA="[]"
              NEXT_PAGE=""
              PAGE_NUM=0
              while true; do
                PAGE_NUM=$((PAGE_NUM + 1))
                API_URL="https://api.anthropic.com/v1/organizations/cost_report?starting_at=${START_DATE}&ending_at=${END_DATE}"
                if [ -n "$NEXT_PAGE" ]; then
                  API_URL="${API_URL}&next_page=${NEXT_PAGE}"
                fi

                RESPONSE=$(curl -s -w "\n%{http_code}" -H "x-api-key: ${ANTHROPIC_ADMIN_KEY}" \
                  -H "anthropic-version: 2023-06-01" \
                  "$API_URL" 2>/dev/null || echo "{}")

                HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                BODY=$(echo "$RESPONSE" | sed '$d')
                echo "Cost API page $PAGE_NUM: HTTP $HTTP_CODE, days=$(echo "$BODY" | jq '.data | length' 2>/dev/null || echo 0)"

                if ! echo "$BODY" | jq -e '.data' >/dev/null 2>&1; then
                  echo "Cost API error: $(echo "$BODY" | jq -r '.error' 2>/dev/null || echo "$BODY")"
                  break
                fi

                # Merge this page's data into ALL_DATA
                ALL_DATA=$(echo "$ALL_DATA" "$BODY" | jq -s '.[0] + (.[1].data)')

                HAS_MORE=$(echo "$BODY" | jq -r '.has_more // false')
                if [ "$HAS_MORE" = "true" ]; then
                  NEXT_PAGE=$(echo "$BODY" | jq -r '.next_page // empty')
                  if [ -z "$NEXT_PAGE" ]; then break; fi
                else
                  break
                fi

                # Safety: max 10 pages
                if [ "$PAGE_NUM" -ge 10 ]; then break; fi
              done

              echo "Total day buckets fetched: $(echo "$ALL_DATA" | jq 'length')"

              # API amounts are in cents — divide by 100 for USD
              DAILY_TOTALS=$(echo "$ALL_DATA" | jq '[.[] | {day: .starting_at, total: (([.results[].amount | tonumber] | add // 0) / 100)}]')
              DAYS_WITH_DATA=$(echo "$DAILY_TOTALS" | jq '[.[] | select(.total > 0)] | length')
              echo "Days with cost data: $DAYS_WITH_DATA"
              echo "Daily totals: $(echo "$DAILY_TOTALS" | jq -c '[.[] | select(.total > 0) | {d: .day[0:10], t: (.total * 100 | round / 100)}]')"
              if [ "$DAYS_WITH_DATA" -gt 0 ]; then
                AVG_DAILY_COST=$(echo "$DAILY_TOTALS" | jq "([.[] | select(.total > 0) | .total] | add) / $DAYS_WITH_DATA | . * 100 | round / 100")
                PEAK_DAILY_COST=$(echo "$DAILY_TOTALS" | jq '[.[] | .total] | max | . * 100 | round / 100')
                TOTAL_API_SPEND=$(echo "$DAILY_TOTALS" | jq '[.[].total] | add | . * 100 | round / 100')
                echo "Anthropic costs: avg=$AVG_DAILY_COST/day, peak=$PEAK_DAILY_COST/day, total=$TOTAL_API_SPEND"
              fi
            fi
          else
            echo "No ANTHROPIC_ADMIN_KEY set, using defaults"
          fi

          cat > stats.json << EOF
          {
            "websiteCommits": ${WEBSITE_COMMITS},
            "privateAgentCommits": ${AGENT_COMMITS},
            "totalCommits": ${TOTAL},
            "websiteLinesOfCode": ${WEBSITE_LOC},
            "agentLinesOfCode": ${AGENT_LOC},
            "linesOfCode": ${LINES_OF_CODE},
            "chartCount": ${CHART_COUNT},
            "articleCount": ${ARTICLE_COUNT},
            "wordsOfContent": ${WORDS_OF_CONTENT},
            "pageCount": ${PAGE_COUNT},
            "avgDailyCost": ${AVG_DAILY_COST},
            "peakDailyCost": ${PEAK_DAILY_COST},
            "totalApiSpend": ${TOTAL_API_SPEND},
            "lastUpdated": "${UPDATED}"
          }
          EOF

          # Clean leading whitespace from heredoc
          sed -i 's/^          //' stats.json

          echo "Total: ${TOTAL}"

      - name: Commit stats.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update stats.json [automated]"
          git push
