name: Update Stats

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch commit counts
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          PRIVATE_REPO: ljcairns/openclaw-config
          PUBLIC_REPO: ljcairns/briu-website
        run: |
          set -e

          # Count commits by paginating (reliable for any repo size)
          count_commits() {
            local url="$1"
            local auth_header="$2"
            local total=0
            local page=1

            while true; do
              if [ -n "$auth_header" ]; then
                RESPONSE=$(curl -s -H "Authorization: Bearer ${auth_header}" \
                  "${url}?per_page=100&page=${page}")
              else
                RESPONSE=$(curl -s "${url}?per_page=100&page=${page}")
              fi

              COUNT=$(echo "$RESPONSE" | jq '. | length' 2>/dev/null || echo "0")

              if [ "$COUNT" = "0" ] || [ "$COUNT" = "null" ]; then
                break
              fi

              total=$((total + COUNT))

              if [ "$COUNT" -lt 100 ]; then
                break
              fi

              page=$((page + 1))
            done

            echo "$total"
          }

          # Public repo
          WEBSITE_COMMITS=$(count_commits "https://api.github.com/repos/${PUBLIC_REPO}/commits" "")
          echo "Website commits: ${WEBSITE_COMMITS}"

          # Private repo
          AGENT_COMMITS=0
          if [ -n "$PRIVATE_REPO_TOKEN" ]; then
            AGENT_COMMITS=$(count_commits "https://api.github.com/repos/${PRIVATE_REPO}/commits" "$PRIVATE_REPO_TOKEN")
            echo "Agent commits: ${AGENT_COMMITS}"
          else
            echo "No PRIVATE_REPO_TOKEN set, skipping private repo"
          fi

          TOTAL=$((WEBSITE_COMMITS + AGENT_COMMITS))
          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Lines of code across .html, .js, .css (excluding node_modules, .wrangler, package-lock.json)
          LINES_OF_CODE=$(find . \( -name '*.html' -o -name '*.js' -o -name '*.css' \) \
            -not -path '*/node_modules/*' -not -path '*/.wrangler/*' -not -name 'package-lock.json' \
            -exec cat {} + | wc -l | tr -d ' ')
          echo "Lines of code: ${LINES_OF_CODE}"

          # Chart count (Briu.charts. assignments in charts.js)
          CHART_COUNT=0
          if [ -f charts.js ]; then
            CHART_COUNT=$(grep -c 'Briu\.charts\.' charts.js || true)
          fi
          echo "Chart count: ${CHART_COUNT}"

          # Article count (directories under /build/ with index.html)
          ARTICLE_COUNT=0
          if [ -d build ]; then
            ARTICLE_COUNT=$(find build -mindepth 1 -name 'index.html' | wc -l | tr -d ' ')
          fi
          echo "Article count: ${ARTICLE_COUNT}"

          # Words of content across all build article HTML files
          WORDS_OF_CONTENT=0
          if [ -d build ]; then
            WORDS_OF_CONTENT=$(find build -name 'index.html' -exec cat {} + | sed 's/<[^>]*>//g' | wc -w | tr -d ' ')
          fi
          echo "Words of content: ${WORDS_OF_CONTENT}"

          # Total HTML pages on the site
          PAGE_COUNT=$(find . -name 'index.html' \
            -not -path '*/node_modules/*' -not -path '*/.wrangler/*' | wc -l | tr -d ' ')
          echo "Page count: ${PAGE_COUNT}"

          cat > stats.json << EOF
          {
            "websiteCommits": ${WEBSITE_COMMITS},
            "privateAgentCommits": ${AGENT_COMMITS},
            "totalCommits": ${TOTAL},
            "linesOfCode": ${LINES_OF_CODE},
            "chartCount": ${CHART_COUNT},
            "articleCount": ${ARTICLE_COUNT},
            "wordsOfContent": ${WORDS_OF_CONTENT},
            "pageCount": ${PAGE_COUNT},
            "lastUpdated": "${UPDATED}"
          }
          EOF

          # Clean leading whitespace from heredoc
          sed -i 's/^          //' stats.json

          echo "Total: ${TOTAL}"

      - name: Commit stats.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update stats.json [automated]"
          git push
