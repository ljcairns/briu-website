name = "briu-assess"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
ALLOWED_ORIGIN = "https://briu.ai"
MAIL_DESTINATION = "hi@briu.ai"

# Set via `wrangler secret put`:
# ANTHROPIC_API_KEY
# DISCORD_WEBHOOK (optional)
# OPENCLAW_WEBHOOK (optional)
# OPENCLAW_WEBHOOK_TOKEN (optional)

# Conversation storage
[[kv_namespaces]]
binding = "CONVERSATIONS"
id = "1b36a305e4204874bafb42fe9a105dc0"

# Distributed rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "dac7967fcf58452a97330374e2ed4f9c"

# Daily FAQ analysis + metrics aggregation
[triggers]
crons = ["0 6 * * *"]

# Analytics D1 database
[[d1_databases]]
binding = "DB"
database_name = "briu-analytics"
database_id = "8f125fff-d3d5-404b-a9cc-a8a6c0a131d5"
