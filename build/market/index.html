<style>
article { max-width: 820px; margin: 0 auto; padding: 0 1.5rem 4rem; }

.explorer-controls { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 2rem 0 1.5rem; }
.metric-btn { background: var(--surface); border: 1px solid rgba(255,255,255,0.06); color: var(--text-muted); font-family: var(--sans); font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.55rem 1.1rem; cursor: pointer; transition: all 0.25s ease; }
.metric-btn:hover { border-color: rgba(212,160,90,0.3); color: var(--text); }
.metric-btn.active { background: rgba(212,160,90,0.12); border-color: var(--gold); color: var(--gold); }

.chart-wrapper { position: relative; background: var(--surface); border: 1px solid rgba(255,255,255,0.04); border-radius: 4px; padding: 1.5rem; margin-bottom: 1.5rem; }
.chart-wrapper canvas { max-height: 400px; }

.metric-description { padding: 1.25rem 1.5rem; background: var(--surface); border: 1px solid rgba(255,255,255,0.04); border-radius: 4px; margin-bottom: 1.5rem; }
.metric-description .source { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 0.35rem; }
.metric-description blockquote { font-family: var(--serif); font-size: 1.05rem; color: var(--text); line-height: 1.6; margin: 0.5rem 0; padding-left: 1rem; border-left: 2px solid rgba(212,160,90,0.25); font-style: italic; }
.metric-description .context { font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; margin-top: 0.75rem; }

.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin: 2rem 0 1.5rem; }
.metric-card { text-align: center; padding: 1.25rem 0.75rem; background: var(--surface); border: 1px solid rgba(255,255,255,0.04); border-radius: 4px; }
.metric-card-number { font-family: var(--serif); font-size: 1.6rem; color: var(--gold); }
.metric-card-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-top: 0.35rem; }

@media (max-width: 640px) {
  .explorer-controls { flex-direction: column; }
  .metric-btn { width: 100%; text-align: center; }
  .chart-wrapper { padding: 1rem; }
  .metric-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

  <h1>AI Market Explorer</h1>
  <p>Interactive data from leading tech voices. Toggle between metrics to see where the market is heading and why it matters for your business.</p>
</section>

<article>
  <div class="explorer-controls" id="controls"></div>
  <div class="chart-wrapper"><canvas id="explorer-chart"></canvas></div>
  <div class="metric-description" id="metric-desc"></div>

<script>
(function() {
  'use strict';

  var GOLD = '#D4A05A';
  var GOLD_LIGHT = '#E2B574';
  var CORAL = '#E07B5F';
  var FOREST = '#6AAE9C';
  var RIVER = '#5A9DAC';
  var COLORS = [GOLD, CORAL, FOREST, RIVER, GOLD_LIGHT, '#8B5E3C'];

  var metrics = [
    {
      id: 'automation-by-role',
      label: 'Automation Rates',
      type: 'bar',
      source: 'All-In Podcast E259 — Jason Calacanis',
      quote: 'My SDR is 95% automated. My producer? 40 of 50 hours a week handled by agents.',
      context: 'Automation penetration varies wildly by role. Repetitive, rules-based work (SDR outreach, scheduling) automates nearly completely. Creative and judgment-heavy roles lag behind. The gap represents the current frontier for agent deployment.',
      labels: ['SDR', 'Producer', 'Exec Assistant', 'Investment Team'],
      data: [95, 80, 30, 20],
      unit: '%'
    },
    {
      id: 'cost-per-hour',
      label: 'Cost Arbitrage',
      type: 'bar',
      source: 'All-In Podcast E259 — Chamath Palihapitiya',
      quote: 'The cost arbitrage is insane. You\'re comparing $12 an hour to $150 an hour.',
      context: 'AI agents operate at a fraction of human labor cost. The gap is widest against consultants and senior hires, making agent-augmented services a structural cost advantage for firms that deploy them.',
      labels: ['AI Agent', 'Junior Hire', 'Senior Hire', 'Consultant'],
      data: [12.5, 25, 50, 150],
      unit: '$/hr'
    },
    {
      id: 'infrastructure-capex',
      label: 'Infrastructure Spend',
      type: 'doughnut',
      source: 'All-In Podcast E259 — David Friedberg',
      quote: 'Four companies alone are spending $600 billion on AI infrastructure this year.',
      context: 'Hyperscaler capital expenditure on AI infrastructure dwarfs all prior tech investment cycles. This spending is creating the compute substrate that makes agent-based services viable at scale, while also driving secondary effects across energy, construction, and commodities.',
      labels: ['Hyperscaler CapEx ($B)', 'GDP Tailwind (%)', 'Construction Jobs (1mo)', 'Copper Price Surge (%)'],
      data: [600, 2, 33000, 26],
      unit: 'mixed'
    },
    {
      id: 'employee-leverage',
      label: 'Productivity Leverage',
      type: 'bar',
      source: 'All-In Podcast E261 — Jason Calacanis',
      quote: 'The best employees are 10 to 20x more productive with AI. The floor is 2x.',
      context: 'AI adoption creates a productivity multiplier, not a flat boost. The range between minimum (2x) and top performer (20x) means the gap between adopters and non-adopters compounds over time. Organizations that wait don\'t just fall behind linearly.',
      labels: ['Non-adopter', 'Minimum bar', 'Strong adopter', 'Top performer'],
      data: [1, 2, 10, 20],
      unit: 'x'
    },
    {
      id: 'deployment-velocity',
      label: 'Deployment Velocity',
      type: 'line',
      source: 'All-In Podcast E259 — Jason Calacanis',
      quote: '72 hours. Five agents deployed from scratch.',
      context: 'Agent deployment follows a classic adoption curve: fast initial setup, steady capability expansion, then rapid acceleration as agents learn organizational context. The early weeks matter most because they establish the feedback loops that drive later gains.',
      labels: ['Week 1', 'Week 4', 'Week 10', 'Week 18', 'Week 26'],
      data: [5, 20, 50, 85, 95],
      unit: '%'
    },
    {
      id: 'cost-compression',
      label: 'Cost Compression',
      type: 'bar',
      source: 'All-In Podcast E259 — Chamath Palihapitiya',
      quote: 'Route 95% of calls to local models, 5% to the cloud. $100 a day becomes $10.',
      context: 'Hybrid model routing (local for routine tasks, cloud for complex reasoning) compresses operating costs by 10x or more. This is the architecture that makes always-on agents economically viable rather than a luxury experiment.',
      labels: ['Day 1 (cloud)', 'Closed-source at scale', 'Hybrid routing', 'Optimized local'],
      data: [100, 1000, 100, 10],
      unit: '$/day'
    },
    {
      id: 'energy-bottleneck',
      label: 'Energy Gap',
      type: 'line',
      source: 'All-In Podcast E261 — David Friedberg',
      quote: 'Chips are outrunning power. By 2028 we\'ll have the silicon but not the watts.',
      context: 'Compute capacity is growing faster than the energy infrastructure to power it. This divergence will constrain AI scaling by 2028 and creates a structural advantage for architectures (like hybrid local/cloud) that minimize power-intensive cloud compute.',
      labels: ['2024', '2025', '2026', '2028', '2030'],
      data: [15, 35, 60, 85, 100],
      secondary: [20, 22, 25, 40, 60],
      unit: 'GW'
    },
    {
      id: 'sublinear-scaling',
      label: 'Scaling Dynamics',
      type: 'line',
      source: 'Lex Fridman #333 — Andrej Karpathy',
      quote: '10x the ambition only requires 2-3x the effort when you fundamentally redesign the approach.',
      context: 'AI-native approaches exhibit sublinear scaling: effort grows slower than ambition. This is why companies that redesign workflows around agents (rather than bolting AI onto existing processes) see disproportionate returns. The curve flattens as you go bigger.',
      labels: ['1x ambition', '2x ambition', '5x ambition', '10x ambition'],
      data: [1, 1.4, 2, 2.5],
      unit: 'x effort'
    },
    {
      id: 'job-creation',
      label: 'Job Creation',
      type: 'bar',
      source: 'Moonshots #237 — Alex Finn',
      quote: 'FAANG laid off 15,000. AI will create 100 million new entrepreneurs, 300 million new jobs.',
      context: 'The displacement narrative misses the creation side. AI lowers the barrier to starting and running businesses, which historically creates more jobs than it eliminates. The ratio is orders of magnitude in favor of creation.',
      labels: ['FAANG Layoffs', 'New Entrepreneurs', 'Jobs Created'],
      data: [15000, 100000000, 300000000],
      unit: 'people'
    }
  ];

  var chart = null;
  var activeMetric = metrics[0];

  function formatNumber(n) {
    if (n >= 1000000000) return (n / 1000000000).toFixed(0) + 'B';
    if (n >= 1000000) return (n / 1000000).toFixed(0) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
    return n.toString();
  }

  function renderControls() {
    var controls = document.getElementById('controls');
    var html = '';
    for (var i = 0; i < metrics.length; i++) {
      var m = metrics[i];
      html += '<button class="metric-btn' + (m.id === activeMetric.id ? ' active' : '') + '" data-id="' + m.id + '">' + m.label + '</button>';
    }
    controls.innerHTML = html;

    var btns = controls.querySelectorAll('.metric-btn');
    for (var j = 0; j < btns.length; j++) {
      btns[j].addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        for (var k = 0; k < metrics.length; k++) {
          if (metrics[k].id === id) { activeMetric = metrics[k]; break; }
        }
        renderControls();
        renderChart();
        renderDescription();
        renderGrid();
      });
    }
  }

  function renderChart() {
    if (chart) chart.destroy();

    var ctx = document.getElementById('explorer-chart').getContext('2d');
    var m = activeMetric;
    var chartType = m.type === 'doughnut' ? 'doughnut' : m.type;

    var datasets = [{
      label: m.label,
      data: m.data,
      backgroundColor: chartType === 'line' ? 'rgba(212,160,90,0.1)' : COLORS.slice(0, m.data.length),
      borderColor: chartType === 'line' ? GOLD : COLORS.slice(0, m.data.length),
      borderWidth: chartType === 'line' ? 2 : 0,
      fill: chartType === 'line',
      tension: 0.3,
      pointBackgroundColor: GOLD,
      pointRadius: chartType === 'line' ? 5 : 0,
      pointHoverRadius: chartType === 'line' ? 7 : 0
    }];

    if (m.secondary) {
      datasets.push({
        label: 'Power Supply (GW)',
        data: m.secondary,
        backgroundColor: 'rgba(224,123,95,0.1)',
        borderColor: CORAL,
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointBackgroundColor: CORAL,
        pointRadius: 5,
        pointHoverRadius: 7,
        borderDash: [5, 5]
      });
    }

    var options = {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          display: m.secondary ? true : false,
          labels: { color: '#C4B9A8', font: { family: "'DM Sans', sans-serif", size: 12 } }
        },
        tooltip: {
          backgroundColor: '#0E1219',
          titleColor: '#D4A05A',
          bodyColor: '#EAE7E3',
          borderColor: 'rgba(212,160,90,0.2)',
          borderWidth: 1,
          titleFont: { family: "'DM Serif Display', serif" },
          bodyFont: { family: "'DM Sans', sans-serif" },
          callbacks: {
            label: function(ctx) {
              var val = ctx.parsed.y !== undefined ? ctx.parsed.y : ctx.parsed;
              if (m.unit === 'mixed') return ctx.label + ': ' + formatNumber(val);
              return ctx.dataset.label + ': ' + formatNumber(val) + ' ' + m.unit;
            }
          }
        }
      },
      scales: chartType === 'doughnut' ? {} : {
        x: {
          ticks: { color: '#C4B9A8', font: { family: "'DM Sans', sans-serif", size: 11 } },
          grid: { color: 'rgba(255,255,255,0.04)' }
        },
        y: {
          beginAtZero: true,
          ticks: {
            color: '#C4B9A8',
            font: { family: "'DM Sans', sans-serif", size: 11 },
            callback: function(val) { return formatNumber(val); }
          },
          grid: { color: 'rgba(255,255,255,0.04)' }
        }
      }
    };

    chart = new Chart(ctx, {
      type: chartType,
      data: { labels: m.labels, datasets: datasets },
      options: options
    });
  }

  function renderDescription() {
    var el = document.getElementById('metric-desc');
    var m = activeMetric;
    el.innerHTML = '<p class="source">' + m.source + '</p>' +
      '<blockquote>"' + m.quote + '"</blockquote>' +
      '<p class="context">' + m.context + '</p>';
  }

  function renderGrid() {
    var el = document.getElementById('metric-grid');
    var m = activeMetric;
    var html = '';
    for (var i = 0; i < m.labels.length; i++) {
      var displayUnit = m.unit === 'mixed' ? '' : ' ' + m.unit;
      html += '<div class="metric-card">' +
        '<div class="metric-card-number">' + formatNumber(m.data[i]) + displayUnit + '</div>' +
        '<div class="metric-card-label">' + m.labels[i] + '</div>' +
        '</div>';
    }
    el.innerHTML = html;
  }

  renderControls();
  renderChart();
  renderDescription();
  renderGrid();
})();
</script>
</body>
</html>
