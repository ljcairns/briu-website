<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="30">
<meta name="robots" content="noindex, nofollow">
<title>Live Analysis | Briu</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07090E;
  --surface: #0E1219;
  --surface-2: #151B24;
  --text: #EAE7E3;
  --text-muted: #C4B9A8;
  --gold: #D4A05A;
  --gold-light: #E2B574;
  --gold-bright: #EDCA8A;
  --coral: #E07B5F;
  --forest: #6AAE9C;
  --river: #5A9DAC;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; overflow-x: hidden; }
@media (min-width: 768px) { html { font-size: 19px; } }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.07;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background-image: radial-gradient(circle, rgba(212,160,90,0.18) 1px, transparent 1px);
  background-size: 24px 24px;
}

/* Header */
.live-header {
  padding: 1.5rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(212,160,90,0.08);
  position: relative;
  z-index: 10;
}
.live-header .logo img { height: 72px; width: auto; }
.live-status {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--forest);
}
.live-dot {
  width: 8px;
  height: 8px;
  background: var(--forest);
  border-radius: 50%;
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(106,174,156,0.5); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(106,174,156,0); }
}

/* Main */
.live-main {
  flex: 1;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
  padding: 3rem 2rem 4rem;
  position: relative;
  z-index: 10;
}

/* Hero area */
.live-hero {
  text-align: center;
  margin-bottom: 3.5rem;
}
.live-eyebrow {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  color: var(--gold);
  margin-bottom: 1.25rem;
  display: inline-flex;
  align-items: center;
  gap: 1rem;
}
.live-eyebrow::before, .live-eyebrow::after {
  content: '';
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold));
}
.live-eyebrow::after { background: linear-gradient(90deg, var(--gold), transparent); }
.live-hero h1 {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.15;
  color: var(--text);
  margin-bottom: 1rem;
}
.live-hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--gold), var(--gold-bright));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.live-hero-sub {
  font-size: 0.95rem;
  color: var(--text-muted);
  max-width: 480px;
  margin: 0 auto;
}

/* Loading dots */
.loading-dots {
  display: inline-flex;
  gap: 0.35rem;
  margin-top: 1.5rem;
}
.loading-dots span {
  width: 6px;
  height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: dotPulse 1.4s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* Section cards */
.live-section {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 2rem;
  margin-bottom: 1.25rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.6s ease, box-shadow 0.6s ease;
}
.live-section.ready {
  border-color: rgba(212,160,90,0.15);
  box-shadow: 0 4px 30px rgba(0,0,0,0.15);
  animation: sectionReveal 0.6s ease forwards;
}
@keyframes sectionReveal {
  from { opacity: 0.7; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-label {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--gold);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.section-icon {
  width: 18px;
  height: 18px;
  opacity: 0.8;
}

.section-content { min-height: 80px; }

/* Skeleton shimmer */
.skeleton .section-content {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.skeleton-line {
  height: 14px;
  background: linear-gradient(90deg, var(--surface-2) 25%, rgba(255,255,255,0.04) 50%, var(--surface-2) 75%);
  background-size: 400% 100%;
  animation: shimmer 2s ease-in-out infinite;
  border-radius: 2px;
}
.skeleton-line:nth-child(1) { width: 85%; }
.skeleton-line:nth-child(2) { width: 70%; }
.skeleton-line:nth-child(3) { width: 55%; }
.skeleton-line:nth-child(4) { width: 40%; }
@keyframes shimmer {
  0% { background-position: 200% center; }
  100% { background-position: -200% center; }
}

/* Pending label */
.skeleton .section-label::after {
  content: 'Pending';
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  opacity: 0.5;
  margin-left: auto;
  text-transform: uppercase;
}
.ready .section-label::after { display: none; }

/* Live content styling */
.live-section:not(.skeleton) .section-content h3 {
  font-family: var(--serif);
  font-size: 1.15rem;
  color: var(--text);
  margin-bottom: 0.75rem;
}
.live-section:not(.skeleton) .section-content p {
  font-size: 0.88rem;
  color: var(--text-muted);
  line-height: 1.65;
  margin-bottom: 0.5rem;
}
.live-section:not(.skeleton) .section-content ul {
  list-style: none;
  padding: 0;
}
.live-section:not(.skeleton) .section-content li {
  font-size: 0.88rem;
  color: var(--text-muted);
  line-height: 1.65;
  padding: 0.35rem 0 0.35rem 1.1rem;
  position: relative;
}
.live-section:not(.skeleton) .section-content li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.75em;
  width: 5px;
  height: 5px;
  background: var(--gold);
  border-radius: 50%;
}

/* CTA section special styling */
.live-section[data-section="cta-section"]:not(.skeleton) {
  text-align: center;
  border-color: rgba(212,160,90,0.2);
  background: linear-gradient(135deg, var(--surface) 0%, rgba(212,160,90,0.03) 100%);
}
.live-section[data-section="cta-section"]:not(.skeleton) .cta-button {
  display: inline-block;
  margin-top: 1rem;
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--gold);
  text-decoration: none;
  padding: 0.75rem 2rem;
  border: 1px solid rgba(212,160,90,0.4);
  transition: all 0.35s ease;
}
.live-section[data-section="cta-section"]:not(.skeleton) .cta-button:hover {
  background: rgba(212,160,90,0.08);
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(212,160,90,0.1);
}

/* Footer */
.live-footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid rgba(255,255,255,0.04);
  position: relative;
  z-index: 10;
}
.live-footer p {
  font-size: 0.7rem;
  color: var(--text-muted);
  opacity: 0.5;
  letter-spacing: 0.04em;
}
.live-footer span {
  color: var(--gold);
  opacity: 0.7;
}

/* Ambient orbs */
.ambient-orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(120px); z-index: -1; }
.ambient-orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(212,160,90,0.05), transparent 70%); top: 10%; left: -10%; animation: orbFloat 25s ease-in-out infinite; }
.ambient-orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(90,157,172,0.04), transparent 70%); bottom: 10%; right: -5%; animation: orbFloat 30s ease-in-out infinite reverse; }
@keyframes orbFloat { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, -40px); } }

/* Timestamp */
.last-updated {
  text-align: center;
  font-size: 0.65rem;
  color: var(--text-muted);
  opacity: 0.4;
  margin-top: 2rem;
  letter-spacing: 0.06em;
}

/* Responsive */
@media (max-width: 640px) {
  .live-header { padding: 1rem 1.25rem; }
  .live-header .logo img { height: 56px; }
  .live-main { padding: 2rem 1.25rem 3rem; }
  .live-section { padding: 1.5rem; }
}
</style>
</head>
<body>

<div class="ambient-orb ambient-orb-1"></div>
<div class="ambient-orb ambient-orb-2"></div>

<header class="live-header">
  <a href="https://briu.ai" class="logo">
    <img src="/images/briu-logo.png" alt="Briu">
  </a>
  <div class="live-status">
    <div class="live-dot"></div>
    Live
  </div>
</header>

<main class="live-main">
  <div class="live-hero">
    <div class="live-eyebrow">Custom Analysis</div>
    <h1>Building your <em>custom analysis</em>...</h1>
    <p class="live-hero-sub">This page updates in real time as we discuss your needs.</p>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="live-section skeleton" data-section="company-overview">
    <div class="section-label">
      <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
      Company Overview
    </div>
    <div class="section-content">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
  </div>

  <div class="live-section skeleton" data-section="pain-points">
    <div class="section-label">
      <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      Pain Points
    </div>
    <div class="section-content">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
  </div>

  <div class="live-section skeleton" data-section="recommended-workflows">
    <div class="section-label">
      <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Recommended Workflows
    </div>
    <div class="section-content">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
  </div>

  <div class="live-section skeleton" data-section="estimated-roi">
    <div class="section-label">
      <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Estimated ROI
    </div>
    <div class="section-content">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
  </div>

  <div class="live-section skeleton" data-section="cta-section">
    <div class="section-label">
      <svg class="section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Next Steps
    </div>
    <div class="section-content">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
    </div>
  </div>

  <div class="last-updated">Last checked: <span id="timestamp">--</span></div>
</main>

<footer class="live-footer">
  <p>This page was built during our conversation. Powered by <span>Briu AI</span>.</p>
</footer>

<script>
(function() {
  const REFRESH_INTERVAL = 15000;
  const timestampEl = document.getElementById('timestamp');

  function updateTimestamp() {
    const now = new Date();
    timestampEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function refreshContent() {
    fetch(window.location.href, { cache: 'no-cache' })
      .then(function(response) { return response.text(); })
      .then(function(html) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const sections = doc.querySelectorAll('.live-section');

        sections.forEach(function(newSection) {
          const id = newSection.getAttribute('data-section');
          const current = document.querySelector('[data-section="' + id + '"]');
          if (!current) return;

          const wasReady = !current.classList.contains('skeleton');
          const isNowReady = !newSection.classList.contains('skeleton');

          if (isNowReady && !wasReady) {
            current.classList.remove('skeleton');
            current.classList.add('ready');
            current.querySelector('.section-content').innerHTML = newSection.querySelector('.section-content').innerHTML;
          } else if (isNowReady && wasReady) {
            const newContent = newSection.querySelector('.section-content').innerHTML;
            const oldContent = current.querySelector('.section-content').innerHTML;
            if (newContent !== oldContent) {
              current.querySelector('.section-content').innerHTML = newContent;
            }
          }
        });

        // Update hero if changed
        const newHero = doc.querySelector('.live-hero');
        const currentHero = document.querySelector('.live-hero');
        if (newHero && currentHero) {
          const newHeroHTML = newHero.innerHTML;
          const currentHeroHTML = currentHero.innerHTML;
          if (newHeroHTML !== currentHeroHTML) {
            currentHero.innerHTML = newHeroHTML;
          }
        }

        // Hide loading dots once any section is ready
        var readySections = document.querySelectorAll('.live-section.ready');
        if (readySections.length > 0) {
          var dots = document.querySelector('.loading-dots');
          if (dots) dots.style.display = 'none';
        }

        updateTimestamp();
      })
      .catch(function() {
        updateTimestamp();
      });
  }

  updateTimestamp();
  setInterval(refreshContent, REFRESH_INTERVAL);
})();
</script>
</body>
</html>
