function categorize(p) {
  if (p.startsWith('build/') && p !== 'build/index.html') return 'Build Articles';
  if (p.startsWith('prospects/')) return 'Prospects';
  if (p.startsWith('admin/')) return 'Admin';
  if (p === 'chart-preview.html' || p.startsWith('services/calculator')) return 'Tools';
  return 'Main Pages';
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderPages() {

    var cat = categorize(pg.path);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(pg);
  });
  var html = '<h2>Pages <span class="section-count">(' + pages.length + ' files)</span></h2>';
  order.forEach(function(group) {
    if (!groups[group] || !groups[group].length) return;
    html += '<h3>' + group + ' (' + groups[group].length + ')</h3>';
    html += '<table><thead><tr><th>Path</th><th>Last Modified</th><th>Commit</th><th>Live Link</th></tr></thead><tbody>';

      var livePath = pg.path === 'index.html' ? '' : pg.path.replace(/\/index\.html$/, '/').replace(/\.html$/, '');

      html += '</tr>';
    });
    html += '</tbody></table>';
  });
  document.getElementById('pages-section').innerHTML = html;
}

(function() {
  var html = '<h2>What Changed Today <span class="section-count">(' + recentCommits.length + ' commits)</span></h2>';
  html += '<button class="refresh-btn" onclick="location.reload()">↻ Refresh</button><br><br>';
  recentCommits.forEach(function(c) {
    html += '<div class="commit-block">';
    html += '<span class="commit-hash">' + escapeHtml(c.hash) + '</span> ';
    html += '<span class="commit-time">' + escapeHtml(c.date) + '</span><br>';
    html += '<span class="commit-msg">' + escapeHtml(c.msg) + '</span>';
    if (c.files && c.files.length) {
      html += '<div class="commit-files">';
      c.files.forEach(function(f) {
        var cls = f.status === 'A' ? 'added' : f.status === 'D' ? 'deleted' : 'modified';
        html += '<span class="' + cls + '">' + escapeHtml(f.status) + '</span> ' + escapeHtml(f.path) + '<br>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  document.getElementById('changes-section').innerHTML = html;
})();

// === PURE JS TABLE SORTING ===
function makeSortable(table) {
  if (!table) return;
  var headers = table.querySelectorAll('th');
  headers.forEach(function(th, idx) {
    th.addEventListener('click', function() {
      var tbody = table.querySelector('tbody');
      var rows = Array.from(tbody.querySelectorAll('tr'));
      var asc = !th.classList.contains('sort-asc');
      headers.forEach(function(h) { h.classList.remove('sort-asc', 'sort-desc'); });
      th.classList.add(asc ? 'sort-asc' : 'sort-desc');
      rows.sort(function(a, b) {
        var at = (a.cells[idx] || {}).textContent || '';
        var bt = (b.cells[idx] || {}).textContent || '';
        return asc ? at.localeCompare(bt) : bt.localeCompare(at);
      });
      rows.forEach(function(r) { tbody.appendChild(r); });
    });
  });
}

// Make all tables sortable
document.querySelectorAll('table').forEach(makeSortable);
